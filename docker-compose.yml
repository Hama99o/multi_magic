# =============================================================================
# DEVELOPMENT ONLY — use with: docker compose up
# For production deployment, use your CI/CD pipeline with Dockerfile.prod
# =============================================================================

x-dev-app: &default-app
  build:
    context: "."
    dockerfile: "Dockerfile.dev"
    target: "app"
    args:
      - "RAILS_ENV=${RAILS_ENV:-development}"
      - "RUBY_VERSION=3.2.2"
      - "NODE_VERSION=22.12.0"
      - "BUNDLER_VERSION=2.7.2"
  image: "multi_magic:dev"
  env_file:
    - ".env"
  restart: "${DOCKER_RESTART_POLICY:-unless-stopped}"
  stop_grace_period: "3s"
  volumes:
    - ".:/app/"
    - "/app/node_modules" # Exclude node_modules from host volume mount
    - "/app/tmp" # Exclude tmp for better performance
  tty: true
  stdin_open: true
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  postgres:
    image: "postgres:15.3-alpine"
    restart: "${DOCKER_RESTART_POLICY:-unless-stopped}"
    stop_grace_period: "3s"
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      # POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - "postgres:/var/lib/postgresql/data"
      - "./latest.dump:/tmp/latest.dump" # Mount dump file
    ports:
      - "5443:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "${DOCKER_POSTGRES_CPUS:-0}"
          memory: "${DOCKER_POSTGRES_MEMORY:-0}"

  redis:
    image: "redis:7.2.4"
    restart: "${DOCKER_RESTART_POLICY:-unless-stopped}"
    stop_grace_period: "3s"
    command: "redis-server"
    ports:
      - "6369:6379"
    volumes:
      - "redis:/data"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "${DOCKER_REDIS_CPUS:-0}"
          memory: "${DOCKER_REDIS_MEMORY:-0}"

  web:
    <<: *default-app
    environment:
      - "RAILS_ENV=development"
      - "NODE_ENV=development"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${DOCKER_WEB_PORT_FORWARD:-127.0.0.1:3001}:${PORT:-3001}"
    command: >
      bash -c "rm -f tmp/pids/server.pid &&
               bundle install &&
               bin/rails server -b 0.0.0.0 -p ${PORT:-3001}"
    deploy:
      resources:
        limits:
          cpus: "${DOCKER_WEB_CPUS:-0}"
          memory: "${DOCKER_WEB_MEMORY:-0}"

  worker:
    <<: *default-app
    environment:
      - "RAILS_ENV=development"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: bash -c "bundle install && bundle exec sidekiq -C config/sidekiq.yml"
    entrypoint: []
    deploy:
      resources:
        limits:
          cpus: "${DOCKER_WORKER_CPUS:-0}"
          memory: "${DOCKER_WORKER_MEMORY:-0}"

  cable:
    <<: *default-app
    environment:
      - "RAILS_ENV=development"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: bash -c "bundle install && bundle exec puma -p 28081 cable/config.ru"
    entrypoint: []
    ports:
      - "${DOCKER_CABLE_PORT_FORWARD:-127.0.0.1:28081}:28081"
    deploy:
      resources:
        limits:
          cpus: "${DOCKER_CABLE_CPUS:-0}"
          memory: "${DOCKER_CABLE_MEMORY:-0}"

  node:
    <<: *default-app
    environment:
      - "VITE_RUBY_HOST=0.0.0.0"
      - "RAILS_ENV=development"
      - "NODE_ENV=development"
    command: bash -c "npm install --legacy-peer-deps && npm run dev"
    ports:
      - "3002:3002"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres: {}
  redis: {}
